version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
      include: scope
    groups:
      gomod:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # Frontend npm packages (Vue SPA lives in web/)
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
      include: scope
    ignore:
      # Pinned to 7.x: the 8.0 release changed the license.
      - dependency-name: "primeicons"
        update-types:
          - version-update:semver-major
    groups:
      npm:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # GitHub Actions used by CI and release workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - major
          - minor
          - patch
