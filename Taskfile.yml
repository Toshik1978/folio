version: "3"

tasks:
  setup:
    desc: Install dependencies and prepare workspace
    cmds:
      - mkdir -p web/dist && touch web/dist/.gitkeep
      - cd web && npm install
      - go mod tidy

  setup:ci:
    desc: Install dependencies and prepare workspace on CI
    cmds:
      - mkdir -p web/dist && touch web/dist/.gitkeep
      - cd web && npm ci
      - go mod download

  generate:
    desc: Run sqlc code generation
    cmd: sqlc generate

  dev:backend:
    desc: Run Go backend server
    cmd: go run cmd/folio-idx/main.go

  dev:frontend:
    desc: Run Vite dev server with HMR
    dir: web
    cmd: npm run dev

  lint:sql:
    desc: Fail on non-ASCII bytes in the SQL that feeds sqlc (they silently corrupt codegen)
    cmd: |
      # sqlc reads both the queries and the migration schema; a stray non-ASCII
      # byte (e.g. an em-dash in a comment) makes its lexer drop the rest of a
      # statement — the generated Go builds but runs a truncated query. Allow only
      # printable ASCII plus tab; newlines never appear inside a grepped line.
      tab=$(printf '\t')
      if LC_ALL=C grep -rn --include='*.sql' "[^${tab} -~]" internal/db/queries internal/db/migrations; then
        echo "" >&2
        echo "ERROR: non-ASCII byte(s) found in SQL above. Replace them with ASCII" >&2
        echo "       (e.g. '—' -> '-' or ':') and re-run 'task generate'." >&2
        exit 1
      fi

  lint:backend:
    desc: Run Go linters
    cmd: golangci-lint run

  lint:frontend:
    desc: Run Node.js linters
    dir: web
    cmds:
      - npm run typecheck
      - npm run lint
      - npm run format:check

  lint:
    desc: Full linters run (frontend + backend)
    cmds:
      - task: lint:frontend
      - task: lint:sql
      - task: lint:backend

  test:backend:
    desc: Run all Go tests
    cmd: go test -v -coverpkg=./internal/... ./internal/...

  test:frontend:
    desc: Run frontend unit tests
    dir: web
    cmd: npm run test

  test:frontend:ci:
    desc: Run frontend unit tests with coverage and JSON output (CI)
    dir: web
    cmd: npm run test:ci

  test:
    desc: Run all tests
    cmds:
      - task: test:frontend
      - task: test:backend

  format:backend:
    desc: Run gofumpt
    cmds:
      - golangci-lint fmt
      - golangci-lint run --fix

  format:frontend:
    desc: Run Prettier formatter
    dir: web
    cmd: npm run format

  format:
    desc: Run formatters
    cmds:
      - task: format:frontend
      - task: format:backend

  build:frontend:
    desc: Type-check and bundle Vue SPA
    dir: web
    cmd: npm run build

  build:backend:
    desc: Compile Go binary with embedded SPA
    deps: [build:frontend]
    cmds:
      - mkdir -p bin
      - CGO_ENABLED=0 go build -ldflags="-w -s" -o bin/folio-idx cmd/folio-idx/main.go
    generates:
      - bin/folio-idx

  build:
    desc: Full production build (frontend + backend)
    deps: [build:backend]

  build:docker:
    desc: Build Docker container
    cmd: docker build -t folio-idx:latest .

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/
      - rm -rf web/dist/*
      - touch web/dist/.gitkeep
